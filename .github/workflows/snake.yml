name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # REQUIRED to push files

    steps:
      - name: Generate snake files
        uses: Platane/snk@v3
        with:
          github_user_name: Sid19944
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            execSync('git config user.name "github-actions"');
            execSync('git config user.email "github-actions@github.com"');

            execSync('git checkout --orphan output');
            execSync('git rm -rf .');

            execSync('cp -r dist/* .');

            execSync('git add .');
            execSync('git commit -m "Update snake"');

            execSync('git push -f origin output');
